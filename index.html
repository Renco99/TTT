<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nico Tapia - Performance Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #fcfcf9; font-family: 'Inter', sans-serif; }
        .chart-container { position: relative; width: 100%; height: 250px; }
        .italic-black { font-style: italic; font-weight: 900; text-transform: uppercase; letter-spacing: -0.04em; }
        
        .grid-row {
            display: grid;
            grid-template-columns: 2.5fr 1fr 1fr 1fr 1fr 1fr;
            align-items: center;
            text-align: center;
        }

        /* Ajuste de tamaño del input RPE */
        .rpe-input {
            @apply w-6 h-8 bg-orange-50 border-b-2 border-orange-200 text-center text-xl font-black text-orange-600 focus:outline-none focus:border-orange-500 transition-all rounded-md;
        }

        .card-pro {
            @apply bg-white rounded-xl border border-stone-200 px-6 py-4 mb-2 transition-all hover:border-stone-400;
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="text-stone-800 antialiased">

    <div class="max-w-6xl mx-auto px-4 py-6">
        
        <header class="flex flex-col md:flex-row md:items-end justify-between mb-8 border-b-2 pb-6 border-stone-100">
            <div class="space-y-1">
                <div class="flex items-center gap-3">
                    <span class="bg-black text-white text-[10px] font-black px-2 py-0.5 rounded italic uppercase">NICO TAPIA</span>
                    <span class="text-orange-600 font-black text-[10px] uppercase tracking-widest italic">• PERFORMANCE</span>
                </div>
                <h1 class="text-4xl italic-black text-stone-900 leading-none">DASHBOARD</h1>
                <p id="rango-semana" class="text-stone-400 font-black italic text-xs uppercase mt-1">--/-- — --/--</p>
            </div>
            
            <div class="bg-stone-900 text-white p-4 rounded-2xl text-center min-w-[150px] shadow-xl border-b-4 border-orange-600">
                <p class="text-[9px] font-black text-orange-500 uppercase tracking-widest italic">RPE PROMEDIO</p>
                <div class="text-5xl italic-black" id="weekly-avg">0.0</div>
            </div>
        </header>

        <div class="bg-white rounded-3xl shadow-sm border border-stone-200 p-6 mb-8">
            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
        </div>

        <div class="grid-row px-8 mb-4 text-[12px] font-black text-stone-400 uppercase tracking-widest italic">
            <div class="text-left">Ejercicio</div>
            <div>Categoría</div>
            <div>Series</div>
            <div>Reps</div>
            <div>Pausa</div>
            <div class="text-orange-600">RPE</div>
        </div>

        <div id="workout-container" class="space-y-2 pb-20">
            <p class="text-center py-10 italic text-stone-400">Sincronizando planificación...</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://shutiqoewzforhebaxsd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNodXRpcW9ld3pmb3JoZWJheHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTA1MzAsImV4cCI6MjA5Mjg4NjUzMH0.SHRjH_oeirCQqXU7WIOsnBMadDKHXuUvaTMLjH7a5-A'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let performanceChart;

        async function initDashboard() {
            setWeekRange();
            initChart();
            await fetchWorkoutData();
        }

        function setWeekRange() {
            const hoy = new Date();
            const diaSemana = hoy.getDay(); 
            const diff = hoy.getDate() - diaSemana + (diaSemana === 0 ? -6 : 1); 
            const lunes = new Date(hoy.setDate(diff));
            const domingo = new Date(lunes);
            domingo.setDate(lunes.getDate() + 6);
            const opt = { day: 'numeric', month: 'short' };
            document.getElementById('rango-semana').innerText = `Semana: ${lunes.toLocaleDateString('es-ES', opt)} — ${domingo.toLocaleDateString('es-ES', opt)}`;
        }

        async function fetchWorkoutData() {
            const container = document.getElementById('workout-container');
            
            const { data: plan, error } = await _supabase
                .from('planificacion')
                .select(`id, series, repeticiones, descanso, rpe, ejercicios ( nombre )`)
                .order('id', { ascending: true });

            if (error) {
                console.error("Error detectado:", error);
                container.innerHTML = `<div class="p-6 bg-red-50 text-red-500 rounded-xl text-center font-bold text-xs">Error 400: Revisa las columnas de tu tabla en Supabase.</div>`;
                return;
            }

            container.innerHTML = plan.map(item => `
                <div class="card-pro grid-row">
                    <div class="text-left">
                        <span class="text-orange-600 text-[8px] font-black uppercase block mb-1">STRENGTH</span>
                        <h4 class="text-xl font-black italic text-stone-900 leading-tight">
                            ${item.ejercicios?.nombre || 'Ejercicio'}
                        </h4>
                    </div>
                    <div class="text-stone-300 text-[9px] font-black uppercase italic">HYBRID</div>
                    <div class="text-2xl font-black italic text-stone-900">${item.series || 0}</div>
                    <div class="text-2xl font-black italic text-stone-900">${item.repeticiones || 0}</div>
                    <div class="text-2xl font-black italic text-stone-900">${item.descanso || 0}</div>
                    <div class="flex justify-center">
                        <input type="number" value="${item.rpe || ''}" 
                               oninput="autoSave(${item.id}, this.value)"
                               class="rpe-input" placeholder="-">
                    </div>
                </div>`).join('');

            updateUI(plan);
        }

        let timeout = null;
        function autoSave(planId, value) {
            clearTimeout(timeout);
            timeout = setTimeout(async () => {
                const rpeNum = parseInt(value) || 0;
                await _supabase.from('planificacion').update({ rpe: rpeNum }).eq('id', planId);
                const { data: updated } = await _supabase.from('planificacion').select('rpe');
                updateUI(updated);
            }, 400);
        }

        function updateUI(data) {
            const valid = (data || []).filter(d => d.rpe > 0).map(d => d.rpe);
            const avg = valid.length ? (valid.reduce((a, b) => a + b, 0) / valid.length).toFixed(1) : "0.0";
            document.getElementById('weekly-avg').innerText = avg;
            
            performanceChart.data.labels = valid.map((_, i) => `E${i+1}`);
            performanceChart.data.datasets[0].data = valid;
            performanceChart.update();
        }

        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            performanceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        borderColor: '#ea580c',
                        backgroundColor: 'rgba(234, 88, 12, 0.1)',
                        borderWidth: 4, fill: true, tension: 0.4, pointBackgroundColor: '#000', pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, max: 10, ticks: { font: { weight: 'bold' } } },
                        x: { grid: { display: false }, ticks: { font: { weight: 'bold' } } }
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
