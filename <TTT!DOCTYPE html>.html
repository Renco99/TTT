<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYROX Performance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #fcfcf9; font-family: 'Inter', sans-serif; }
        .chart-container { position: relative; width: 100%; height: 240px; }
        .day-card { transition: all 0.2s ease; cursor: pointer; border: 2px solid #f3f4f6; }
        .day-card.active { border-color: #ea580c; background-color: #fff; transform: translateY(-2px); shadow: 0 10px 15px -3px rgba(234, 88, 12, 0.1); }
        .checkbox-custom {
            appearance: none; width: 1.4rem; height: 1.4rem; border: 2px solid #d6d3d1;
            border-radius: 0.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .checkbox-custom:checked { background-color: #ea580c; border-color: #ea580c; }
        .checkbox-custom:checked::after { content: '✓'; color: white; font-weight: 900; }
        .rpe-input {
            @apply w-12 bg-white border border-stone-200 text-center text-[12px] font-black text-orange-600 rounded-md py-1 focus:outline-none focus:border-orange-500;
        }
    </style>
</head>
<body class="text-stone-800 antialiased">

    <div class="max-w-6xl mx-auto px-4 py-6 md:py-10">
        
        <header class="flex flex-col md:flex-row md:items-end justify-between mb-8 border-b-2 pb-8 border-stone-100">
            <div class="space-y-1">
                <div class="flex items-center gap-2">
                    <span class="bg-black text-white text-[9px] font-black px-2 py-0.5 rounded tracking-widest uppercase italic">PERFORMANCE LOG</span>
                    <span id="current-week" class="text-orange-600 font-bold text-[10px] uppercase tracking-widest italic">• MICRO SEMANA 1</span>
                </div>
                <h1 class="text-5xl font-black text-stone-900 tracking-tighter italic uppercase">
                    HYROX <span class="text-orange-600">HUB</span>
                </h1>
            </div>
            <div id="session-progress" class="mt-6 md:mt-0 text-[10px] font-black text-stone-400 border-2 border-stone-200 rounded-full px-6 py-2 uppercase tracking-widest italic">
                PROGRESO: 0%
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-8">
            <div class="lg:col-span-3 bg-white rounded-[2.5rem] shadow-sm border border-stone-200 p-8">
                <h2 class="text-[10px] font-black text-stone-400 uppercase tracking-widest italic mb-6">Esfuerzo Real vs Objetivo</h2>
                <div class="chart-container">
                    <canvas id="performanceChart"></canvas>
                </div>
            </div>
            
            <div class="bg-stone-900 text-white rounded-[2.5rem] p-8 flex flex-col justify-between shadow-xl">
                <div>
                    <h3 class="text-orange-500 font-black uppercase text-[10px] tracking-widest mb-4 italic">Carga de Trabajo</h3>
                    <div class="text-5xl font-black italic tracking-tighter" id="avg-rpe">--</div>
                    <div class="text-[9px] text-stone-500 uppercase font-black tracking-widest mt-1">RPE Promedio Atleta</div>
                </div>
                <button onclick="location.reload()" class="mt-8 text-[10px] font-black uppercase tracking-widest border border-stone-700 p-3 rounded-xl hover:bg-stone-800">Sincronizar Datos</button>
            </div>
        </div>

        <div id="workout-list" class="space-y-4">
            <div class="text-center py-20 text-stone-400 italic">Conectando con base de datos...</div>
        </div>

    </div>

    <script>
        const SUPABASE_URL = 'https://shutiqoewzforhebaxsd.supabase.co';
        const SUPABASE_KEY = 'TU_ANON_KEY_AQUÍ'; // <--- PEGA TU KEY AQUÍ
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myChart;

        async function init() {
            await fetchAndRender();
            initChart();
        }

        async function fetchAndRender() {
            const container = document.getElementById('workout-list');
            
            const { data, error } = await _supabase
                .from('seguimiento')
                .select(`
                    id, rpe, completado, series, repeticiones,
                    ejercicios ( nombre, video_url, categoria, target_rpe )
                `);

            if (error) {
                container.innerHTML = "Error al cargar datos.";
                return;
            }

            // Actualizar Métricas Superiores
            const completados = data.filter(d => d.completado).length;
            const progreso = Math.round((completados / data.length) * 100) || 0;
            document.getElementById('session-progress').innerText = `PROGRESO: ${progreso}%`;
            
            const rpes = data.filter(d => d.rpe > 0).map(d => d.rpe);
            const avg = rpes.length ? (rpes.reduce((a,b) => a+b, 0) / rpes.length).toFixed(1) : "--";
            document.getElementById('avg-rpe').innerText = avg;

            // Renderizar Lista
            container.innerHTML = data.map(item => `
                <div class="bg-white rounded-[1.5rem] border border-stone-200 p-6 flex flex-col md:flex-row items-center gap-6 shadow-sm">
                    <div class="flex-1 flex items-center gap-4">
                        <input type="checkbox" class="checkbox-custom" ${item.completado ? 'checked' : ''} 
                               onclick="updateStatus(${item.id}, ${!item.completado})">
                        <div>
                            <h4 class="text-lg font-black italic uppercase tracking-tighter">${item.ejercicios.nombre}</h4>
                            <span class="text-[9px] font-bold text-stone-400 uppercase italic">${item.ejercicios.categoria}</span>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-8 bg-stone-50 px-6 py-3 rounded-2xl border border-stone-100">
                        <div class="text-center">
                            <p class="text-[8px] font-black text-stone-400 uppercase">Series</p>
                            <p class="font-bold italic">${item.series}</p>
                        </div>
                        <div class="text-center">
                            <p class="text-[8px] font-black text-stone-400 uppercase">Reps</p>
                            <p class="font-bold italic">${item.repeticiones}</p>
                        </div>
                        <div class="text-center border-l pl-6 border-stone-200">
                            <p class="text-[8px] font-black text-orange-600 uppercase">Tu RPE</p>
                            <input type="number" class="rpe-input" value="${item.rpe || ''}" 
                                   onchange="updateRPE(${item.id}, this.value)" min="1" max="10">
                        </div>
                    </div>
                    <a href="${item.ejercicios.video_url}" target="_blank" class="text-[10px] font-black text-stone-400 hover:text-orange-600 transition uppercase italic">Video ↗</a>
                </div>
            `).join('');

            updateChart(data);
        }

        async function updateRPE(id, val) {
            await _supabase.from('seguimiento').update({ rpe: parseInt(val), completado: true }).eq('id', id);
            fetchAndRender();
        }

        async function updateStatus(id, status) {
            await _supabase.from('seguimiento').update({ completado: status }).eq('id', id);
            fetchAndRender();
        }

        function initChart() {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [], // Se llena dinámicamente
                    datasets: [
                        { label: 'Target', data: [], borderColor: '#e5e7eb', borderWidth: 2, borderDash: [5, 5], fill: false, tension: 0.4 },
                        { label: 'Real', data: [], borderColor: '#ea580c', borderWidth: 4, pointBackgroundColor: '#fff', fill: true, backgroundColor: 'rgba(234, 88, 12, 0.05)', tension: 0.4 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { min: 0, max: 10, ticks: { font: { size: 10, weight: '900' } } },
                        x: { display: false }
                    }
                }
            });
        }

        function updateChart(data) {
            myChart.data.labels = data.map(d => d.ejercicios.nombre);
            myChart.data.datasets[0].data = data.map(d => d.ejercicios.target_rpe);
            myChart.data.datasets[1].data = data.map(d => d.rpe);
            myChart.update();
        }

        init();
    </script>
</body>
</html>
